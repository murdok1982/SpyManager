name: imc_mobile
description: IMC Operative Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  # Navigation
  go_router: ^13.0.0
  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  # Network
  dio: ^5.4.0
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  # Location
  geolocator: ^11.0.0
  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  # Biometrics
  local_auth: ^2.2.0
  # Crypto
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  fonts:
    - family: RobotoMono
      fonts:
        - asset: fonts/RobotoMono-Regular.ttf
        - asset: fonts/RobotoMono-Bold.ttf
          weight: 700

name: imc_mobile
description: State-military intelligence mobile application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_bloc: ^8.1.3
  
  # Networking
  dio: ^5.4.0
  
  # Sensors and hardware
  sensors_plus: ^4.0.2
  flutter_blue_plus: ^1.16.0
  device_info_plus: ^10.1.0
  
  # Storage and security
  sqflite: ^2.3.3
  path: ^1.8.3
  
  # Multimodal intelligence
  whisper_flutter: ^0.1.0
  tflite_flutter: ^1.1.2
  image: ^4.1.3
  
  # Background services
  flutter_background_service: ^5.0.0
  
  # Utilities
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/whisper-tiny.bin
    - assets/yolov8n.tflite

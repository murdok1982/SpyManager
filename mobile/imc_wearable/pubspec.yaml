name: imc_wearable
description: State-military intelligence wearable application for WearOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_bloc: ^8.1.3
  
  # Networking
  dio: ^5.4.0
  
  # Sensors and hardware
  sensors_plus: ^4.0.2
  flutter_blue_plus: ^1.16.0
  device_info_plus: ^10.1.0
  
  # Storage and security
  sqflite: ^2.3.3
  path: ^1.8.3
  
  # Background services
  flutter_background_service: ^5.0.0
  
  # WearOS specific
  wear: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
